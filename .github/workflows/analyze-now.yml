name: analyze-now

# 폰(신호 화면 → 지금 기술분석 실행) 또는 수동으로 호출하는 온디맨드 기술 분석.
# 뉴스/촉매 없이 차트·거래량·변동성 지표만으로 관심종목(control.json)을 재분석해 feed.json 갱신.
# LLM 미사용·무료. KIS 현재가 + yfinance 일봉 실측. 휴장일·주말 포함 언제나 실행(직전 거래일 일봉).
#
# 트리거: control.json 이 바뀌어 push 될 때 자동 실행(앱이 run_requested_at·watchlist 수정·저장
# 시 발생). 앱 토큰은 contents:write 만으로 충분 — Actions 권한 불필요(과거 workflow_dispatch
# 403 해소). 수동 실행을 위해 workflow_dispatch 도 유지한다.

on:
  workflow_dispatch: {}
  push:
    paths:
      - control.json

permissions:
  contents: write

concurrency:
  group: analyze-now
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 2 — 직전 커밋의 control.json 과 비교해 '분석 요청' 여부 판정용.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # 이번 push 가 '사용자의 분석 요청'(run_requested_at 변경)인지 판정한다.
      # 관심종목 추가/삭제·설정 저장만으로도 control.json 이 push 되지만, 그때는
      # run_requested_at 이 그대로라 알림을 보내지 않는다(불필요 푸시 방지).
      # 분석 요청 여부 + '뉴스 요청 push 인지' 판정.
      #  · run_requested_at 변경 → 사용자가 차트 분석 요청(완료 푸시 대상).
      #  · news_requested_at 변경 → 뉴스 종합분석 요청. 이건 analyze-news.yml 이
      #    차트+뉴스를 함께 돌리므로, 여기서는 **건너뛴다**(차트가 뉴스 덮는 레이스 방지).
      - name: Detect analysis request
        id: req
        run: |
          before=$(git show HEAD~1:control.json 2>/dev/null | jq -r '.engine.run_requested_at // .run_requested_at // ""' 2>/dev/null || echo "")
          after=$(jq -r '.engine.run_requested_at // .run_requested_at // ""' control.json)
          nbefore=$(git show HEAD~1:control.json 2>/dev/null | jq -r '.news_requested_at // ""' 2>/dev/null || echo "")
          nafter=$(jq -r '.news_requested_at // ""' control.json)
          if [ "$before" != "$after" ] && [ -n "$after" ]; then
            echo "requested=true" >> "$GITHUB_OUTPUT"
          else
            echo "requested=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "$nbefore" != "$nafter" ] && [ -n "$nafter" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
          echo "req: run before=$before after=$after | news before=$nbefore after=$nafter"

      - uses: actions/setup-python@v5
        if: steps.req.outputs.skip != 'true'
        with:
          python-version: "3.12"

      - name: Install deps
        if: steps.req.outputs.skip != 'true'
        # pykrx: 전체종목(scope=market) 스캔 시 KRX 거래대금 상위 유니버스 구성용.
        # google-auth: 분석 완료 FCM 푸시 발송용.
        run: pip install --quiet yfinance pandas tzdata pykrx google-auth

      # KIS 접근 토큰은 24h 유효 — '1일 1회 발급' 원칙을 지키기 위해 발급한 토큰을
      # KST 날짜 키로 캐시해 하루 동안 모든 실행이 재사용한다(매 실행 재발급 방지).
      - name: KIS token date (KST)
        if: steps.req.outputs.skip != 'true'
        id: kisdate
        run: echo "d=$(TZ=Asia/Seoul date +%F)" >> "$GITHUB_OUTPUT"

      - name: Cache KIS access token (1일 1회 발급)
        if: steps.req.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: config/.kis_token.json
          key: kis-token-${{ steps.kisdate.outputs.d }}

      - name: Run technical analysis
        if: steps.req.outputs.skip != 'true'
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: python scripts/analyze_technical.py

      - name: Commit & push if changed
        id: commit
        if: steps.req.outputs.skip != 'true'
        run: |
          git add feed.json signals_log.json 2>/dev/null || git add feed.json
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "analyze: 온디맨드 기술 분석 ($(TZ=Asia/Seoul date '+%m-%d %H:%M KST'))"
            # push 레이스(다른 워크플로/수동 push 로 main 이 앞섬) 대비 rebase 재시도.
            ok=false
            for i in 1 2 3; do
              git pull --rebase origin main && git push && { ok=true; break; } || sleep 5
            done
            echo "pushed=$ok" >> "$GITHUB_OUTPUT"
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi

      # 분석 완료 푸시 — '사용자가 요청한 분석'이고(run_requested_at 변경) 새 결과가
      # 나왔을 때(pushed)만. 앱이 꺼져 있어도 '요청한 분석 완료' 알림이 도착한다.
      # FCM_SERVICE_ACCOUNT 시크릿 없으면 fcm_notify.py 가 조용히 건너뜀.
      - name: FCM 분석완료 알림
        if: steps.req.outputs.requested == 'true' && steps.commit.outputs.pushed == 'true'
        env:
          FCM_SERVICE_ACCOUNT: ${{ secrets.FCM_SERVICE_ACCOUNT }}
        run: python scripts/fcm_notify.py --title "✅ 분석 완료" --body "요청하신 분석이 끝났어요. 탭해서 새 신호를 확인하세요."
