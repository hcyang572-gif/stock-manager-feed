name: scheduled-analyze

# 버튼을 누르지 않아도 클라우드가 **자동으로** 기술 분석을 다시 돌려 feed.json 의
# 신호값(진입/손절/목표·점수)을 갱신한다. 두 가지 시점에 동작한다:
#   (1) 예약 분석 — control.json 의 engine.morning_time_kst(시각) + morning_days(요일,
#       앱에서 선택)에 맞춰 1회. **주말·공휴일 요일을 골라도 그 시각에 실행**한다
#       (장이 안 열려도 직전 거래일 일봉으로 분석).
#   (2) 장중 주기 갱신 — KST 정규장(09:00~15:30, 월~금) 동안 주기적으로.
# analyze_technical.py 는 뉴스/촉매 없이 차트·거래량·변동성만 보는 무료 기술 분석이다
# (LLM 미사용). 종합(뉴스+촉매) 분석은 별도 클라우드 예약 루틴이 담당한다.
#
# 사용자가 임의 요일·시각을 고를 수 있어야 하므로 cron 은 24시간 내내 자주 깨우고,
# 아래 'gate' 스텝이 KST 요일·시각과 morning_time_kst·morning_days 를 보고 실제 실행
# 여부를 정확히 판정한다(불필요 실행은 즉시 종료 — 공개 레포라 Actions 분 무제한).

on:
  workflow_dispatch: {}
  schedule:
    # 매 10분, 24시간·매일. gate 가 요일·시각으로 정밀 필터링하므로 임의 예약 시각도
    # 가장 가까운 tick(≤5분)에서 morning_time ±7분 창에 걸려 빠짐없이 실행된다.
    - cron: "*/10 * * * *"

permissions:
  contents: write

concurrency:
  group: analyze-now        # analyze-now(온디맨드)와 직렬화(동시 push 충돌 방지)
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 실행 여부 판정 — KST 요일/시각 + morning_time_kst + morning_days 기준.
      #  · 예약(아침) 분석: 오늘 요일이 morning_days 에 있고 morning_time ±7분이면 실행
      #    (주말·공휴일 요일을 골랐어도 실행 — 직전 거래일 일봉으로 분석).
      #  · 장중 주기 갱신: 평일(월~금) 09:00~15:30 이면 실행(주말 휴장은 제외).
      #  · 그 외엔 즉시 종료.
      - name: Gate (decide whether to analyze)
        id: gate
        run: |
          enabled=$(jq -r '.engine.analysis_enabled // true' control.json)
          dow=$(TZ=Asia/Seoul date +%u)                              # 1=Mon ... 7=Sun
          nowmin=$(( $(TZ=Asia/Seoul date +%-H) * 60 + $(TZ=Asia/Seoul date +%-M) ))
          mt=$(jq -r '.engine.morning_time_kst // "07:00"' control.json)
          mh=${mt%%:*}; mm=${mt##*:}
          mtmin=$(( 10#$mh * 60 + 10#$mm ))
          # 예약 요일(기본 평일 1~5). CSV 로 뽑아 오늘 요일 멤버십을 검사.
          days=$(jq -r '(.engine.morning_days // []) as $d
                        | if ($d|type)=="array" and ($d|length)>0
                          then ($d|map(tostring)|join(",")) else "1,2,3,4,5" end' control.json)
          case ",$days," in *",$dow,"*) day_ok=true;; *) day_ok=false;; esac

          run=false; reason="skip"; notify=false
          if [ "$enabled" != "true" ]; then
            reason="analysis disabled"
          else
            # (1) 장중 주기 갱신 — 평일 09:00~15:30.
            if [ "$dow" -le 5 ] && [ "$nowmin" -ge 540 ] && [ "$nowmin" -le 930 ]; then
              run=true; reason="market-hours periodic"
            fi
            # (2) 예약 분석 — 선택 요일 + morning_time ±7분(주말·휴장일 포함).
            #     이 경우에만 백그라운드 푸시(notify) — 장중 10분 주기는 스팸 방지로 제외.
            diff=$(( nowmin - mtmin )); [ "$diff" -lt 0 ] && diff=$(( -diff ))
            if [ "$day_ok" = "true" ] && [ "$diff" -le 7 ]; then
              run=true; reason="scheduled ($mt dow=$dow)"; notify=true
            fi
          fi
          echo "run=$run" >> "$GITHUB_OUTPUT"
          echo "notify=$notify" >> "$GITHUB_OUTPUT"
          echo "gate: dow=$dow now=$nowmin morning=$mt days=$days day_ok=$day_ok → run=$run notify=$notify ($reason)"

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.run == 'true'
        with:
          python-version: "3.12"

      - name: Install deps
        if: steps.gate.outputs.run == 'true'
        # pykrx: 전체종목 유니버스, google-auth: FCM 푸시 발송용.
        run: pip install --quiet yfinance pandas tzdata pykrx google-auth

      # KIS 토큰 '1일 1회 발급' — KST 날짜 키로 캐시(analyze-now 와 동일 키).
      - name: KIS token date (KST)
        if: steps.gate.outputs.run == 'true'
        id: kisdate
        run: echo "d=$(TZ=Asia/Seoul date +%F)" >> "$GITHUB_OUTPUT"

      - name: Cache KIS access token (1일 1회 발급)
        if: steps.gate.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: config/.kis_token.json
          key: kis-token-${{ steps.kisdate.outputs.d }}

      - name: Run technical analysis
        if: steps.gate.outputs.run == 'true'
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: python scripts/analyze_technical.py

      - name: Commit & push if changed
        id: commit
        if: steps.gate.outputs.run == 'true'
        run: |
          git add feed.json signals_log.json 2>/dev/null || git add feed.json
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "analyze: 자동 기술 분석 ($(TZ=Asia/Seoul date '+%m-%d %H:%M KST'))"
            ok=false
            for i in 1 2 3; do
              git pull --rebase origin main && git push && { ok=true; break; } || sleep 5
            done
            echo "pushed=$ok" >> "$GITHUB_OUTPUT"
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi

      # 백그라운드 푸시 — '예약(아침) 분석'이 새 결과를 냈을 때만(장중 10분 주기 제외).
      # FCM_SERVICE_ACCOUNT 시크릿 없으면 fcm_notify.py 가 조용히 건너뜀.
      - name: FCM 분석완료 알림
        if: steps.gate.outputs.run == 'true' && steps.gate.outputs.notify == 'true' && steps.commit.outputs.pushed == 'true'
        env:
          FCM_SERVICE_ACCOUNT: ${{ secrets.FCM_SERVICE_ACCOUNT }}
        run: python scripts/fcm_notify.py --title "☀️ 오늘의 분석 완료" --body "호창이가 새 매수 신호를 올렸어요. 탭해서 확인하세요."
