name: scheduled-analyze

# 버튼을 누르지 않아도 클라우드가 **자동으로** 기술 분석을 다시 돌려 feed.json 의
# 신호값(진입/손절/목표·점수)을 갱신한다. 두 가지 시점에 동작한다:
#   (1) 아침 분석 — control.json 의 engine.morning_time_kst(앱에서 선택) 시각에 1회.
#   (2) 장중 주기 갱신 — KST 정규장(09:00~15:30, 월~금) 동안 30분마다.
# analyze_technical.py 는 뉴스/촉매 없이 차트·거래량·변동성만 보는 무료 기술 분석이다
# (LLM 미사용). 종합(뉴스+촉매) 아침 분석은 별도 클라우드 예약 루틴이 담당한다.
#
# cron 은 넉넉히 자주 깨우고, 아래 'gate' 스텝이 KST 요일·시각과 morning_time_kst 를
# 보고 실제 실행 여부를 정확히 판정한다(불필요 실행은 즉시 종료).

on:
  workflow_dispatch: {}
  schedule:
    # UTC. KST = UTC+9. gate 스텝이 정밀 필터링하므로 창은 넉넉히 잡는다.
    - cron: "*/15 21-23 * * *"   # KST 06:00~08:59 — 아침 분석 시각 후보 창
    - cron: "*/30 0-6 * * *"     # KST 09:00~15:59 — 장중 주기 갱신 창

permissions:
  contents: write

concurrency:
  group: analyze-now        # analyze-now(온디맨드)와 직렬화(동시 push 충돌 방지)
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 실행 여부 판정 — KST 요일/시각 + morning_time_kst 기준.
      #  · 주말(토·일)은 건너뜀.
      #  · 장중(09:00~15:30)이면 항상 실행(주기 갱신).
      #  · 그 외엔 morning_time_kst ±7분 이내일 때만 실행(아침 분석).
      - name: Gate (decide whether to analyze)
        id: gate
        run: |
          enabled=$(jq -r '.engine.analysis_enabled // true' control.json)
          dow=$(TZ=Asia/Seoul date +%u)          # 1=Mon ... 7=Sun
          now=$(TZ=Asia/Seoul date +%-H*60+%-M)  # 분(자정 기준) 산술식
          nowmin=$(( now ))
          mt=$(jq -r '.engine.morning_time_kst // "07:00"' control.json)
          mh=${mt%%:*}; mm=${mt##*:}
          mtmin=$(( 10#$mh * 60 + 10#$mm ))
          run=false; reason="skip"
          if [ "$enabled" != "true" ]; then
            reason="analysis disabled"
          elif [ "$dow" -ge 6 ]; then
            reason="weekend"
          elif [ "$nowmin" -ge 540 ] && [ "$nowmin" -le 930 ]; then
            run=true; reason="market-hours periodic"
          else
            diff=$(( nowmin - mtmin )); [ "$diff" -lt 0 ] && diff=$(( -diff ))
            if [ "$diff" -le 7 ]; then run=true; reason="morning ($mt)"; fi
          fi
          echo "run=$run" >> "$GITHUB_OUTPUT"
          echo "gate: dow=$dow now=$nowmin morning=$mt → run=$run ($reason)"

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.run == 'true'
        with:
          python-version: "3.12"

      - name: Install deps
        if: steps.gate.outputs.run == 'true'
        run: pip install --quiet yfinance pandas tzdata

      # KIS 토큰 '1일 1회 발급' — KST 날짜 키로 캐시(analyze-now 와 동일 키).
      - name: KIS token date (KST)
        if: steps.gate.outputs.run == 'true'
        id: kisdate
        run: echo "d=$(TZ=Asia/Seoul date +%F)" >> "$GITHUB_OUTPUT"

      - name: Cache KIS access token (1일 1회 발급)
        if: steps.gate.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: config/.kis_token.json
          key: kis-token-${{ steps.kisdate.outputs.d }}

      - name: Run technical analysis
        if: steps.gate.outputs.run == 'true'
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: python scripts/analyze_technical.py

      - name: Commit & push if changed
        if: steps.gate.outputs.run == 'true'
        run: |
          if [ -n "$(git status --porcelain feed.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add feed.json
            git commit -m "analyze: 자동 기술 분석 ($(TZ=Asia/Seoul date '+%m-%d %H:%M KST'))"
            git push
            echo "pushed"
          else
            echo "no change"
          fi
