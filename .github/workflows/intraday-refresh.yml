name: intraday-refresh

# 한국 개장일 08:00~20:00 KST, 10분마다 feed.json 의 종목 시세를 경량 갱신한다.
# NXT(넥스트레이드) 연장거래(프리 08:00~/애프터 ~20:00)를 KIS 통합(UN) 시세로 반영.
# (신규 발굴은 아침 풀 발굴이 담당 — 여기서는 선정 종목 현재가/ext 만 최신화)
# 실제 개장일·시간 가드는 스크립트(intraday_refresh.py)가 KST 기준으로 정밀 판정한다.
# cron 은 UTC 라 KST 창(08:00~20:00 = UTC 23:00~11:00)을 넉넉히 덮고 스크립트가 정확히 거른다.

on:
  schedule:
    - cron: "*/10 23 * * *"      # 08:00~08:50 KST (전일 UTC 23시)
    - cron: "*/10 0-10 * * *"    # 09:00~19:50 KST
    - cron: "0 11 * * *"         # 20:00 KST (마감 직전 1회)
  workflow_dispatch:              # 수동 실행(테스트)
    inputs:
      force:
        description: "시간 가드 무시하고 강제 실행(주말·장외 테스트용)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: intraday-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet holidays tzdata

      - name: Refresh quotes
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: python scripts/intraday_refresh.py ${{ inputs.force && '--force' || '' }}

      - name: Commit & push if changed
        run: |
          if [ -n "$(git status --porcelain feed.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add feed.json
            git commit -m "intraday: 시세 10분 자동갱신·NXT 연장 ($(TZ=Asia/Seoul date '+%m-%d %H:%M KST'))"
            git push
            echo "pushed"
          else
            echo "no change — skip commit"
          fi
