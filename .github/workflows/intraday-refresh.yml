name: intraday-refresh

# 한국 거래일 08:00~20:00 KST, control.robot.interval_min(기본 15분)마다
# ①시세 재갱신(intraday_refresh.py) ②경량 기술 재발굴(analyze_technical.py, 외국인/
# 기관 순매수 포함)을 함께 수행한다. (NXT 연장거래 프리/애프터 포함 — KIS 통합 시세.)
#
# [2026-07-09] 기술 재발굴(외국인/기관 순매수 포함) 슬롯을 15분→10분으로 단축—
# 수급 데이터를 더 실시간에 가깝게 보고 싶다는 사용자 요청. interval_min(시세 루프
# 주기, 기본 5분)이 10분 이하인 한 10분 슬롯 경계마다 루프 반복이 실제로 걸쳐
# 지나가므로 놓치지 않는다(아래 Loop 스텝 참고). interval_min 이 10분보다 커지면
# 슬롯 경계를 건너뛸 수 있으니 그 경우 이 상수를 함께 재검토할 것.
#
# [2026-07-09] 호가불균형(orderbook_imbalance)·대량체결(large_trade_*) 신호 추가 —
# 외국인/기관 수급과 달리 호가·체결테이프는 원천적으로 실시간이라 수급용 10분 슬롯이
# 아니라 ①의 시세 루프(interval_min, 기본 5분)에 얹는다. 대상은 이미 선정된
# signals+observations 뿐(전체종목 풀스캔 아님) — API 레이트리밋 보호. 소스: 호가
# 불균형=KIS(이미 조회 중인 ask_ratio 값 재사용, 신규 호출 0)→토스 폴백, 대량체결=
# 토스 전용(호가·체결 REST). 토스 토큰은 KIS 와 동일하게 날짜별 캐시(아래 Cache Toss
# access token 스텝) — 재발급 시 이전 토큰이 무효화되므로(로컬 PC 스크립트와 계정
# 공유) 남발하지 않는다.
#
# [2026-07-03] 장중 15분마다(2026-07-09 부터 10분마다) 기술 재발굴을 추가한 이유: 무거운 촉매(뉴스/LLM)
# 발굴은 비용 때문에 아침 1회만 하지만, 변동성 돌파·거래량 급증·전고점 돌파·VWAP
# 이탈회복 같은 **차트 기반 신호**는 장중 새로 튀는 급등주를 놓치지 않도록 여기서
# 재스캔한다(관심종목+전체종목 거래대금 상위 통합, LLM 미사용·무료). 기존에는
# scheduled-analyze.yml 의 "*/10 * * * *" 분단위 cron 이 이 역할을 맡았으나 GitHub
# 가 고빈도 cron 을 강하게 throttle 해(실측: 하루 1회 이하) 사실상 죽어있었다.
# 이 워크플로(시간당 기동+내부 sleep 루프)는 이미 검증된 신뢰 패턴이라 재발굴도
# 여기로 옮겨 같은 내성을 얻는다.
#
# [중요] GitHub 의 분단위 cron(*/5,*/10)은 throttle 로 누락이 잦아(종일 0회 발화 사례)
# 신뢰할 수 없다. 그래서 cron 은 **시간당 1회 기동**만 맡고, 실제 폴링은 하나의 잡이
# **내부 sleep 루프**로 ~70분 동안 interval_min 마다 수행한다(throttle 내성). 시간당 기동이
# 겹치면 concurrency(cancel-in-progress)로 새 잡이 이어받아 연속 커버한다.
# 거래일·시간 가드·NXT 판정은 스크립트(intraday_refresh.py)가 KST 로 정밀 처리한다.
# 기술 재발굴은 intraday_refresh.py 의 판정(주말·공휴일·시간창)을 그대로 재사용해
# 거래일이 아니면 함께 건너뛴다(아래 Loop 스텝 참고).
#
# [2026-07-03 장애·근본원인·대책] 오늘 장중 11:10~12:20 KST 실행이 끝난 뒤 12:20~14:20
# KST **2시간 동안 아무 실행도 없어** feed.json 이 고착됐다. gh api 로 당일 00:00~05:21 UTC
# (09:00~14:21 KST) 구간을 전수 조회한 결과 이 레포의 **모든 워크플로에서 schedule 이벤트가
# 단 한 번도 발화하지 않았다**(workflow_dispatch 3건만 존재) — "시간당 1회 기동"이라는 기존
# 설계는 "매 시간 schedule 이 반드시 온다"를 전제했는데, 그 전제 자체가 GitHub 인프라 한계로
# 깨질 수 있음이 실측 확인됨(GitHub 공식 문서도 "높은 부하 시 schedule 이 지연되거나 아예
# 발화하지 않을 수 있다"고 명시 — 정시(:00)는 전세계 cron 이 몰리는 최고 부하 시점이라 더 취약).
# 대책: ① 더는 "다음 schedule 이 반드시 온다"에 기대지 않고, **이 잡이 스스로 끝나기 직전
# 자기 자신을 workflow_dispatch 로 재기동(릴레이)**한다(아래 "Relay 연쇄 재기동" 스텝) — 08:00
# 최초 기동(수동이든 schedule 이든) 이후로는 20:00 KST 까지 schedule 없이도 끊김 없이 이어진다.
# ② 그래도 릴레이가 어떤 이유로든 끊기는 경우를 대비해 시간당 cron 은 **백스톱**으로 유지하되,
# 발화 확률을 높이려 정시(:00)를 피해 오프셋(:07)을 줬다(GitHub 권장사항).

on:
  schedule:
    - cron: "53 22 * * *"     # 07:53 KST 기동(장전 준비, 정시 혼잡 회피 오프셋)
    - cron: "7 0-11 * * *"    # 09:07~20:07 KST 매시 백스톱 기동(정시 혼잡 회피 오프셋).
                               # 정상 동작 시엔 아래 Relay 가 이미 이어받고 있어 대개는
                               # concurrency 로 조용히 흡수되고, 릴레이가 끊겼을 때만 복구 역할.
  workflow_dispatch:
    inputs:
      force:
        description: "시간 가드 무시 강제 실행(주말·장외 테스트용)"
        type: boolean
        default: false

permissions:
  contents: write
  actions: write   # Relay 스텝이 자기 자신을 workflow_dispatch 로 재기동하는 데 필요.

concurrency:
  group: intraday-refresh
  cancel-in-progress: true   # 새 시간당 기동이 이전 루프를 이어받음(연속 커버·중복 방지)

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        # yfinance: 기술 재발굴(analyze_technical.py)의 일봉·지표 계산용.
        run: pip install --quiet holidays tzdata yfinance

      # KIS 토큰 '1일 1회 발급' — KST 날짜 키로 캐시해 다른 워크플로와 공유(재발급 방지).
      - name: KIS token date (KST)
        id: kisdate
        run: echo "d=$(TZ=Asia/Seoul date +%F)" >> "$GITHUB_OUTPUT"

      - name: Cache KIS access token (1일 1회 발급)
        uses: actions/cache@v4
        with:
          path: config/.kis_token.json
          key: kis-token-${{ steps.kisdate.outputs.d }}

      # 토스 액세스 토큰 캐시 — [2026-07-09 신규] 호가불균형 폴백·대량체결 감지용.
      # 토스는 클라이언트당 활성 토큰 1개만 유효해 재발급마다 이전 토큰이 무효화된다
      # (SMS는 없음). ~70분마다 재기동되는 이 잡이 매번 새 토큰을 발급하면 로컬 PC
      # (scripts/compare_quotes.py, 동일 client_id)와 불필요하게 자주 충돌하므로,
      # KIS 와 동일하게 날짜 키로 캐시해 하루 중 재사용한다(진짜 만료/401 때만 재발급).
      - name: Cache Toss access token
        uses: actions/cache@v4
        with:
          path: config/.toss_token.json
          key: toss-token-${{ steps.kisdate.outputs.d }}

      # 내부 sleep 루프 — ~70분 동안 두 가지를 서로 다른 주기로 수행한다:
      #  ①intraday_refresh.py(시세·NXT ext·호가 경량 갱신) — control.json
      #    robot.interval_min(앱이 설정, 기본 5분) 마다. 이 값은 앱 설정화면이
      #    소유하므로 엔진이 되돌려쓰지 않는다(되돌려쓰면 앱 재저장과 핑퐁).
      #  ②analyze_technical.py(관심종목+전체종목 거래대금 상위 경량 기술 재발굴 —
      #    LLM 미사용, 변동성 돌파·거래량 급증·전고점 돌파·VWAP·외국인/기관 순매수 등)
      #    — **고정 10분**(매 정각 :00/:10/:20/:30/:40/:50, interval_min 과 무관하게
      #    코드에서 고정. 2026-07-09 15분→10분 단축 — 수급 데이터 신선도 개선 요청).
      #    무거운 전체종목 스캔이라 interval_min 이 그보다 촘촘해도 10분보다 자주
      #    돌리지 않는다(비용·API 레이트 보호). ★주의★ interval_min(현재 5분)이
      #    10분보다 커지면 10분 슬롯 경계를 건너뛸 수 있다(아래 timeout 방어로 한
      #    회차가 길어져도 마찬가지) — 그 경우 실제 재발굴 간격이 10분보다 벌어진다.
      #    주말·공휴일·시간창 밖이면 ①의 판정(intraday_refresh.py stdout)을 재사용해
      #    ②도 함께 건너뛴다.
      # 매 반복마다 origin/main 으로 hard-reset 해 최신 feed/control 에서 작업(다른
      # 워크플로 push 와의 충돌·rebase 꼬임 방지). 두 스크립트 결과를 한 커밋으로
      # 묶어 push, 거부되면 다음 반복이 reset 후 재시도.
      - name: Loop refresh + rescan (내부 sleep 폴링 ~70분)
        id: loop
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          TOSS_CLIENT_ID: ${{ secrets.TOSS_CLIENT_ID }}
          TOSS_CLIENT_SECRET: ${{ secrets.TOSS_CLIENT_SECRET }}
          FORCE: ${{ inputs.force && '--force' || '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          end=$(( $(date +%s) + 70*60 ))
          last_rescan_slot=""
          nontrading="false"   # 마지막 회차가 주말/공휴일/연말휴장 스킵이었는지(Relay 스텝이 참조)
          while :; do
            git fetch -q origin main 2>/dev/null && git reset --hard -q origin/main 2>/dev/null || true
            interval=$(jq -r '(.robot.interval_min // 5)' control.json 2>/dev/null || echo 5)
            case "$interval" in ''|*[!0-9]*) interval=5;; esac
            [ "$interval" -lt 1 ] && interval=5

            # ★타임아웃 방어★ 클라우드 IP에서 야후/네이버가 간헐적으로 느려지거나
            # 막히면(403·재시도 backoff) 한 회차가 오래 걸려 이후 주기 전체가
            # 밀릴 수 있다. 각 스크립트를 timeout 으로 감싸 한 회차 지연이 다음
            # 주기를 잡아먹지 않게 한다(실패해도 다음 반복이 재시도).
            refresh_out=$(timeout 120 python scripts/intraday_refresh.py $FORCE 2>&1)
            printf '%s\n' "$refresh_out"

            if printf '%s' "$refresh_out" | grep -qE '^\[intraday\] skip \((weekend|holiday|krx-yearend)\)' && [ -z "$FORCE" ]; then
              nontrading="true"
            else
              nontrading="false"
            fi

            # 기술 재발굴(외국인/기관 순매수 포함) — 고정 10분 슬롯(:00/:10/:20/:30/:40/:50)
            # 당 1회만(2026-07-09 15분→10분 단축). 같은 슬롯 안에서 반복 호출되지
            # 않게 last_rescan_slot 으로 중복 방지.
            rescan_slot=$(( ($(TZ=Asia/Seoul date +%-H) * 60 + $(TZ=Asia/Seoul date +%-M)) / 10 ))
            if printf '%s' "$refresh_out" | grep -qE '^\[intraday\] skip \((weekend|holiday|krx-yearend|outside-window)\)' && [ -z "$FORCE" ]; then
              echo "[rescan] 거래일 아님/창 밖 — 기술 재발굴 건너뜀"
            elif [ "$rescan_slot" = "$last_rescan_slot" ] && [ -z "$FORCE" ]; then
              echo "[rescan] 이번 10분 슬롯 이미 수행 — 건너뜀"
            else
              timeout 300 python scripts/analyze_technical.py || echo "[rescan] 기술 재발굴 실패/타임아웃 — 다음 회차 재시도"
              last_rescan_slot="$rescan_slot"
            fi

            if [ -n "$(git status --porcelain feed.json signals_log.json 2>/dev/null)" ]; then
              git add feed.json signals_log.json 2>/dev/null || git add feed.json
              git commit -q -m "intraday: 시세+기술 재발굴 자동갱신 ($(TZ=Asia/Seoul date '+%m-%d %H:%M KST'))" || true
              git push -q || true
            fi
            now=$(date +%s)
            [ "$now" -ge "$end" ] && break
            remain=$(( end - now ))
            [ "$remain" -lt $(( interval * 60 )) ] && break
            sleep $(( interval * 60 ))
          done
          echo "nontrading=$nontrading" >> "$GITHUB_OUTPUT"

      # ★2026-07-03 장애 대책★ — GitHub schedule 이 몇 시간 동안 통째로 발화하지 않아도
      # (실측: 오늘 00:00~05:21 UTC 전 워크플로 schedule 이벤트 0건) 20:00 KST 까지 공백이
      # 안 생기도록, 이 잡이 끝나기 직전 **자기 자신을 workflow_dispatch 로 재기동**한다.
      # 08:00 KST 최초 1회(수동이든 schedule 이든)만 성공하면 그 뒤로는 schedule 안 와도
      # 연쇄적으로 이어진다. concurrency(cancel-in-progress)가 새 릴레이 잡을 이어받으므로
      # 이 잡이 곧 끝나는 것과 겹쳐도 안전(유실 없음 — push 는 이미 위에서 완료됨).
      # 평일·08:00~19:57 KST 안에서만 재기동(그 밖·주말이면 자연 종료). 오늘이 주말/공휴일/
      # 연말휴장으로 판정됐으면(Loop 의 nontrading 출력) 굳이 다음 릴레이를 깨우지 않는다
      # (schedule 백스톱이 필요시 다시 깨움 — 휴일에 70분 루프를 낭비적으로 반복하지 않기 위함).
      # if 는 기본값(성공 시에만) — 이 잡이 concurrency 로 "취소"당한 경우엔 실행하지 않는다
      # (이미 그 취소를 유발한 새 run 이 떠 있으므로, 취소된 쪽까지 또 self-dispatch 하면
      # 릴레이가 이중으로 갈라질 수 있어 굳이 always() 를 쓰지 않는다).
      - name: Relay 연쇄 재기동 (schedule 드롭 대비 — 20:00 KST까지 공백 없이)
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          dow=$(TZ=Asia/Seoul date +%u)     # 1=Mon..7=Sun
          nowmin=$(( $(TZ=Asia/Seoul date +%-H) * 60 + $(TZ=Asia/Seoul date +%-M) ))
          if [ "${{ steps.loop.outputs.nontrading }}" = "true" ]; then
            echo "[relay] 오늘은 비거래일 판정 — 연쇄 재기동 생략(백스톱 cron 이 필요시 깨움)"
          elif [ "$dow" -le 5 ] && [ "$nowmin" -ge 480 ] && [ "$nowmin" -lt 1197 ]; then
            gh workflow run intraday-refresh.yml --repo "${{ github.repository }}" --ref "${{ github.ref_name }}" \
              && echo "[relay] 다음 릴레이 기동 성공" \
              || echo "[relay] self-dispatch 실패 — 다음 시간당 백스톱 cron 이 이어받음"
          else
            echo "[relay] 20:00 KST 이후/주말 — 연쇄 종료"
          fi
