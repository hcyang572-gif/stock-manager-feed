name: intraday-refresh

# 한국 거래일 08:00~20:00 KST, control.robot.interval_min(기본 15분)마다
# ①시세 재갱신(intraday_refresh.py) ②경량 기술 재발굴(analyze_technical.py)을
# 함께 수행한다. (NXT 연장거래 프리/애프터 포함 — KIS 통합 시세.)
#
# [2026-07-03] 장중 15분마다 기술 재발굴을 추가한 이유: 무거운 촉매(뉴스/LLM)
# 발굴은 비용 때문에 아침 1회만 하지만, 변동성 돌파·거래량 급증·전고점 돌파·VWAP
# 이탈회복 같은 **차트 기반 신호**는 장중 새로 튀는 급등주를 놓치지 않도록 여기서
# 재스캔한다(관심종목+전체종목 거래대금 상위 통합, LLM 미사용·무료). 기존에는
# scheduled-analyze.yml 의 "*/10 * * * *" 분단위 cron 이 이 역할을 맡았으나 GitHub
# 가 고빈도 cron 을 강하게 throttle 해(실측: 하루 1회 이하) 사실상 죽어있었다.
# 이 워크플로(시간당 기동+내부 sleep 루프)는 이미 검증된 신뢰 패턴이라 재발굴도
# 여기로 옮겨 같은 내성을 얻는다.
#
# [중요] GitHub 의 분단위 cron(*/5,*/10)은 throttle 로 누락이 잦아(종일 0회 발화 사례)
# 신뢰할 수 없다. 그래서 cron 은 **시간당 1회 기동**만 맡고, 실제 폴링은 하나의 잡이
# **내부 sleep 루프**로 ~70분 동안 interval_min 마다 수행한다(throttle 내성). 시간당 기동이
# 겹치면 concurrency(cancel-in-progress)로 새 잡이 이어받아 연속 커버한다.
# 거래일·시간 가드·NXT 판정은 스크립트(intraday_refresh.py)가 KST 로 정밀 처리한다.
# 기술 재발굴은 intraday_refresh.py 의 판정(주말·공휴일·시간창)을 그대로 재사용해
# 거래일이 아니면 함께 건너뛴다(아래 Loop 스텝 참고).

on:
  schedule:
    - cron: "0 23 * * *"      # 08:00 KST 기동
    - cron: "0 0-11 * * *"    # 09:00~20:00 KST 매시 기동(시간당 1회)
  workflow_dispatch:
    inputs:
      force:
        description: "시간 가드 무시 강제 실행(주말·장외 테스트용)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: intraday-refresh
  cancel-in-progress: true   # 새 시간당 기동이 이전 루프를 이어받음(연속 커버·중복 방지)

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        # yfinance: 기술 재발굴(analyze_technical.py)의 일봉·지표 계산용.
        run: pip install --quiet holidays tzdata yfinance

      # KIS 토큰 '1일 1회 발급' — KST 날짜 키로 캐시해 다른 워크플로와 공유(재발급 방지).
      - name: KIS token date (KST)
        id: kisdate
        run: echo "d=$(TZ=Asia/Seoul date +%F)" >> "$GITHUB_OUTPUT"

      - name: Cache KIS access token (1일 1회 발급)
        uses: actions/cache@v4
        with:
          path: config/.kis_token.json
          key: kis-token-${{ steps.kisdate.outputs.d }}

      # 내부 sleep 루프 — ~70분 동안 두 가지를 서로 다른 주기로 수행한다:
      #  ①intraday_refresh.py(시세·NXT ext·호가 경량 갱신) — control.json
      #    robot.interval_min(앱이 설정, 기본 5분) 마다. 이 값은 앱 설정화면이
      #    소유하므로 엔진이 되돌려쓰지 않는다(되돌려쓰면 앱 재저장과 핑퐁).
      #  ②analyze_technical.py(관심종목+전체종목 거래대금 상위 경량 기술 재발굴 —
      #    LLM 미사용, 변동성 돌파·거래량 급증·전고점 돌파·VWAP 등) — **고정 15분**
      #    (매 정각 :00/:15/:30/:45, interval_min 과 무관하게 코드에서 고정). 무거운
      #    전체종목 스캔이라 interval_min 이 그보다 촘촘해도 15분보다 자주 돌리지
      #    않는다(비용·API 레이트 보호). 주말·공휴일·시간창 밖이면 ①의 판정
      #    (intraday_refresh.py stdout)을 재사용해 ②도 함께 건너뛴다.
      # 매 반복마다 origin/main 으로 hard-reset 해 최신 feed/control 에서 작업(다른
      # 워크플로 push 와의 충돌·rebase 꼬임 방지). 두 스크립트 결과를 한 커밋으로
      # 묶어 push, 거부되면 다음 반복이 reset 후 재시도.
      - name: Loop refresh + rescan (내부 sleep 폴링 ~70분)
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          FORCE: ${{ inputs.force && '--force' || '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          end=$(( $(date +%s) + 70*60 ))
          last_rescan_slot=""
          while :; do
            git fetch -q origin main 2>/dev/null && git reset --hard -q origin/main 2>/dev/null || true
            interval=$(jq -r '(.robot.interval_min // 5)' control.json 2>/dev/null || echo 5)
            case "$interval" in ''|*[!0-9]*) interval=5;; esac
            [ "$interval" -lt 1 ] && interval=5

            # ★타임아웃 방어★ 클라우드 IP에서 야후/네이버가 간헐적으로 느려지거나
            # 막히면(403·재시도 backoff) 한 회차가 오래 걸려 이후 주기 전체가
            # 밀릴 수 있다. 각 스크립트를 timeout 으로 감싸 한 회차 지연이 다음
            # 주기를 잡아먹지 않게 한다(실패해도 다음 반복이 재시도).
            refresh_out=$(timeout 120 python scripts/intraday_refresh.py $FORCE 2>&1)
            printf '%s\n' "$refresh_out"

            # 기술 재발굴 — 고정 15분 슬롯(:00/:15/:30/:45)당 1회만. 같은 슬롯 안에서
            # 반복 호출되지 않게 last_rescan_slot 으로 중복 방지.
            rescan_slot=$(( ($(TZ=Asia/Seoul date +%-H) * 60 + $(TZ=Asia/Seoul date +%-M)) / 15 ))
            if printf '%s' "$refresh_out" | grep -qE '^\[intraday\] skip \((weekend|holiday|krx-yearend|outside-window)\)' && [ -z "$FORCE" ]; then
              echo "[rescan] 거래일 아님/창 밖 — 기술 재발굴 건너뜀"
            elif [ "$rescan_slot" = "$last_rescan_slot" ] && [ -z "$FORCE" ]; then
              echo "[rescan] 이번 15분 슬롯 이미 수행 — 건너뜀"
            else
              timeout 300 python scripts/analyze_technical.py || echo "[rescan] 기술 재발굴 실패/타임아웃 — 다음 회차 재시도"
              last_rescan_slot="$rescan_slot"
            fi

            if [ -n "$(git status --porcelain feed.json signals_log.json 2>/dev/null)" ]; then
              git add feed.json signals_log.json 2>/dev/null || git add feed.json
              git commit -q -m "intraday: 시세+기술 재발굴 자동갱신 ($(TZ=Asia/Seoul date '+%m-%d %H:%M KST'))" || true
              git push -q || true
            fi
            now=$(date +%s)
            [ "$now" -ge "$end" ] && break
            remain=$(( end - now ))
            [ "$remain" -lt $(( interval * 60 )) ] && break
            sleep $(( interval * 60 ))
          done
