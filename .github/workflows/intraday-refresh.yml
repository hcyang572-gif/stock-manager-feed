name: intraday-refresh

# 한국 개장일 07:30~18:30 KST, 30분마다 feed.json 의 종목 시세를 경량 갱신한다.
# (신규 발굴은 아침 풀 발굴이 담당 — 여기서는 선정 종목 현재가만 최신화)
# 실제 개장일·시간 가드는 스크립트(intraday_refresh.py)가 KST 기준으로 정밀 판정한다.
# cron 은 UTC 라 KST 창(07:30~18:30 = UTC 22:30~09:30)을 넉넉히 덮고 스크립트가 정확히 거른다.

on:
  schedule:
    - cron: "0,30 22-23 * * *"   # 07:00~08:30 KST (전일 UTC)
    - cron: "0,30 0-9 * * *"     # 09:00~18:30 KST
  workflow_dispatch: {}           # 수동 실행(테스트)

permissions:
  contents: write

concurrency:
  group: intraday-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet holidays tzdata

      - name: Refresh quotes
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: python scripts/intraday_refresh.py

      - name: Commit & push if changed
        run: |
          if [ -n "$(git status --porcelain feed.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add feed.json
            git commit -m "intraday: 시세 30분 자동갱신 ($(TZ=Asia/Seoul date '+%m-%d %H:%M KST'))"
            git push
            echo "pushed"
          else
            echo "no change — skip commit"
          fi
